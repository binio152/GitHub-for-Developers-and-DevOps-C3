name: 10 - Controlling the Excecution Flow

on:
  workflow_dispatch:
    inputs:
      pass-unit-test:
        type: boolean
        description: Whether unit tests will pass
        default: true

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Linting and building
        run: |
          echo "Linting and building project"

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Running unit tests
        run: |
          echo "Running tests ..."
      - name: Failing tests
        if: ${{ !inputs.pass-unit-test }}
        run: exit 1

  deploy-non-prod:
    runs-on: ubuntu-latest
    needs:
      - lint-build
      - unit-test
    steps:
      - name: Deploying to non-prod
        run: |
          echo "Running tests ..."

  e2e-test:
    runs-on: ubuntu-latest
    needs:
      - deploy-non-prod
    steps:
      - name: Running e2e tests
        run: |
          echo "Running e2e tests ..."

  system-test:
    runs-on: ubuntu-latest
    needs:
      - deploy-non-prod
    steps:
      - name: Running system tests
        run: |
          echo "Running system tests ..."

  deploy-prod:
    runs-on: ubuntu-latest
    needs:
      - e2e-test
      - system-test
    steps:
      - name: Deploying prod
        run: |
          echo "Deploying ..."
