name: 17.2 - Working with JS Custom Actions

on:
  workflow_dispatch:
    inputs:
      url:
        type: string
        default: https://www.google.com
      max-trials:
        type: string
      delay:
        type: string

jobs:
  ping-url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Run my custom action (Ping URL)
        uses: ./.github/actions/docker-ping-url
        with:
          url: ${{ inputs.url }}
          max-trials: ${{ inputs.max-trials }}
          delay: ${{ inputs.delay }}
