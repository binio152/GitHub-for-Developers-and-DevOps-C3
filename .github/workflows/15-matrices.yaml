name: 15 - Working with Matrices

on:
  workflow_dispatch:

jobs:
  backwards-compatibility:
    name: ${{ matrix.os }} - ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]
        os:
          - ubuntu-latest
          - windows-latest
        include:
          - os: macos-latest
            node-version: 25.x
          - os: ubuntu-latest
            node-version: 21.x
            tag: experimental
        exclude:
          - os: windows-latest
            node-version: 24.x
    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Fail if experimental
        if: ${{ matrix.tag == 'experimental' }}
        run: exit 1
      - name: Testing
        run: echo "Running test on ${{ runner.os }} and Node ${{matrix.node-version}}"
