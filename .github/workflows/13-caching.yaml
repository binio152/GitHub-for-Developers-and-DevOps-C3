name: 13 - Using Caching

on:
  workflow_dispatch:
    inputs:
      use-cache:
        description: Wether to execute cache step
        type: boolean
        default: true
      node-version:
        description: Node version
        type: string
        default: "25.x"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 13-caching
    steps:
      - name: Checkout Node.js
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Download Cached dependencies
        uses: actions/cache@v5
        if: ${{ inputs.use-cache }}
        id: cache
        with:
          path: 13-caching/node_modules
          key: deps-node-modules-${{hashFiles('13-caching/package-lock.json')}}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Testing and Linting
        run: |
          npm run test
          npm run lint

      - name: Building
        run: npm run build

      - name: Deploying to non-product
        run: echo "Deploying to non-prod"
