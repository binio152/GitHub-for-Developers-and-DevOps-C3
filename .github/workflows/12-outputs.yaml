name: 12 - Using Outputs

on:
  workflow_dispatch:
    inputs:
      build-status:
        type: choice
        options:
          - success
          - failure
        default: success
      test_status:
        type: choice
        options:
          - success
          - failure

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_status: ${{ steps.build.outputs.status }}
    steps:
      - name: Print GITHUB_OUTPUT path
        run: echo "$GITHUB_OUTPUT"

      - name: Build
        id: build
        run: echo "status=${{ inputs.build-status }}" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      e2e-test_status: ${{ steps.e2e-testing.outputs.status }}
      system-test_status: ${{ steps.system-testing.outputs.status }}
      unit-test_status: ${{ steps.system-testing.outputs.status }}
      test_status: ${{ steps.test_result.outputs.status }}

    steps:
      - name: E2E Testing
        id: e2e-testing
        run: echo "status=${{ inputs.test_status }}" >> $GITHUB_OUTPUT

      - name: System Testing
        id: system-testing
        run: echo "status=${{ inputs.test_status }}" >> $GITHUB_OUTPUT

      - name: Unit Testing
        id: unit-testing
        run: echo "status=${{ inputs.test_status }}" >> $GITHUB_OUTPUT

      - name: Print Outputs
        id: test_result
        run: echo "status=${{ steps.e2e-testing.outputs.status == 'success' && steps.system-testing.outputs.status == 'success' && steps.unit-testing.outputs.status && 'success' || 'failure'}}" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - test
    if: ${{ needs.build.outputs.build_status == 'success' && needs.test.outputs.test_status == 'success'}}
    steps:
      - name: Deploy
        run: echo "Deploying ..."
