name: 12 - Using Outputs

on:
  workflow_dispatch:
    inputs:
      build-status:
        type: choice
        options:
          - success
          - failure
        default: success
      test_status:
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-status: ${{ steps.build.outputs.status }}
    steps:
      - name: Print GITHUB_OUTPUT path
        run: echo "$GITHUB_OUTPUT"

      - name: Build
        id: build
        run: echo "status=${{ inputs.build-status }}" >> $GITHUB_OUTPUT

  e2e-test:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      test_status: ${{ steps.testing.outputs.status }}
    steps:
      - name: Testing
        id: testing
        run: echo "status=${{ inputs.test_status }}" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - e2e-test
    if: ${{ needs.build.outputs.build-status == 'success' && needs.e2e-test.outputs.test_status == 'success'}}
    steps:
      - name: Deploy
        run: echo "Deploying ..."
