name: 17.2 - Working with JS Custom Actions

on:
  workflow_dispatch:
  issues:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  dependency-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Run my custom action (Log github context)
        uses: ./.github/actions/js-dependency-update
        with:
          github-token: ${{ vars.SECRET_GITHUB_TOKEN || secrets.SECRET_GITHUB_TOKEN}}
