name: 17.2 - Working with JS Custom Actions

on:
  workflow_dispatch:
    inputs:
      base-branch:
        type: string
        default: main
      target-branch:
        type: string
        default: update-dependencies
      working-directory:
        type: string
        default: react-app
      debug:
        type: boolean
        default: false
  issues:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  dependency-update:
    permissions: write-all

    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Run my custom action (Update dependencies)
        uses: ./.github/actions/js-dependency-update
        with:
          github-token: ${{ github.token }}
          base-branch: ${{ inputs.base-branch }}
          target-branch: ${{ inputs.target-branch }}
          working-directory: ${{ inputs.working-directory }}
          debug: ${{ inputs.debug }}
