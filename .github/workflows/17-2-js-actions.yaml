name: 17.2 - Working with JS Custom Actions

on:
  workflow_dispatch:

jobs:
  dependency-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Run my custom action
        id: greeting
        uses: ./.github/actions/js-dependency-update
        with:
          who-to-greet: "Binh"

      - name: Show Output
        run: |
          echo "Logging: ${{ steps.greeting.outputs.logging }}"
