name: 17.2 - Working with JS Custom Actions

on:
  workflow_call:
    inputs:
      github-token:
        type: string
        required: true
  workflow_dispatch:
  issues:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  dependency-update:
    env:
      token: ${{ secrets.SECRET_GITHUB_TOKEN }}

    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Run my custom action (Log github context)
        uses: ./.github/actions/js-dependency-update
        with:
          github-token: ${{ env.token }}
