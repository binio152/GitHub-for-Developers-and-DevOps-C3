name: 11 - Using inputs

on:
  workflow_dispatch:
    inputs:
      dry-run:
        type: boolean
        description: Skip deplotment and only print build output
        default: false
      target:
        type: environment
        required: true
        description: Which environment the work flow will target
      tag:
        type: choice
        options:
          - v1
          - v2
          - v3
        default: v3
        description: Release from which to build and deploy

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Building and Testing
        run: echo "Building adn Testing from tag ${{ inputs.tag }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    if: ${{ !inputs.dry-run }}
    environment: ${{ inputs.target }}
    steps:
      - name: deploy
        run: echo "Deloying to ${{ inputs.target }}"
