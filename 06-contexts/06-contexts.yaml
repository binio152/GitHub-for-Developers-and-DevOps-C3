name: 06 - Contexts
run-name: 06 - Context | DEBUG - ${{inputs.debug}}

on:
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        default: false

env:
  TEST: Hello GitHub Actions
  VAR: Ahjhj

jobs:
  echo-data:
    runs-on: ubuntu-latest
    env:
      VAR: Ahihi
    steps:
      - name: Display Information
        run: |
          echo "Event Name: ${{github.event_name}}"
          echo "Ref: ${{github.ref}}"
          echo "SHA: ${{github.sha}}"
          echo "Actor: ${{github.actor}}"
          echo "Workflow: ${{github.workflow}}"
          echo "Run ID: ${{github.run_id}}"
          echo "Run Number: ${{github.run_number}}"

      - name: Display Variable
        run: |
          echo "Variable value: ${{vars.TEST}}"
        
      - name: Dislay Env Variable
        env:
          VAR: Xin chao
        run: |
            echo "ENV Variable: ${{env.TEST}}"
            echo "ENV Variable: ${{env.VAR}}"
            
      - name: Dislay Env Variable of VAR 
        run: |
            echo "ENV Variable: ${{env.VAR}}"
  echo-data-2:
    runs-on: ubuntu-latest
    steps:
      - name: Display Env Variable
        run: |
          echo "ENV Variable: $TEST"
          echo "ENV Variable: $VAR"
